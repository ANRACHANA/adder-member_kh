<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0f0f10;
  --card:#1a1a24;
  --primary:#00ff7f;
  --danger:#ff4c4c;
  --text:#fff;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f0f10,#1a1a24);
  color:var(--text);
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  padding:12px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}
.nav button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#222;
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}
.nav button.active{
  background:var(--primary);
  color:#000;
  font-weight:bold;
}

/* CONTAINER */
.container{max-width:1100px;margin:auto;padding:15px;}
.page{display:none;}
.page.active{display:block;}

/* CARD */
.card{
  background:var(--card);
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.title{
  text-align:center;
  font-size:20px;
  color:var(--primary);
  margin-bottom:10px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#111;
  color:#fff;
  margin-top:10px;
}

/* BUTTON */
button.main{
  margin-top:12px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:12px;
  background:var(--primary);
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button.main:hover{
  background:#00cc66;
  color:#fff;
}

/* STATUS */
.success{color:var(--primary);}
.failed{color:var(--danger);}
.skipped{color:#aaa;}

/* TABLE */
table{width:100%;border-collapse:collapse;}
td,th{padding:8px;border-bottom:1px solid #333;}
th{color:var(--primary);}

/* PROGRESS */
.bar{background:#111;border-radius:10px;margin-top:10px;}
.progress{height:10px;background:var(--primary);width:0%;border-radius:10px;transition:0.3s;}

/* LIST */
ul{list-style:none;padding:0;max-height:300px;overflow:auto;}
li{padding:6px;border-bottom:1px solid #222;font-size:13px;}

/* CONSOLE */
.console{
  background:#000;
  padding:10px;
  border-radius:12px;
  height:150px;
  overflow:auto;
  font-size:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button class="tab active" data-page="auto">⚡ Auto</button>
<button class="tab" data-page="accounts">👤 Accounts</button>
<button class="tab" data-page="history">🕘 History</button>
</div>

<div class="container">

<!-- AUTO -->
<div id="auto" class="page active">
<div class="card">
<div class="title">Auto Add Members</div>

<input id="source" placeholder="Source Group">
<input id="target" placeholder="Target Group">
<button class="main" id="start">START AUTO</button>

<div id="status"></div>
<div id="counter">0</div>

<div class="bar"><div id="progress" class="progress"></div></div>

<ul id="list"></ul>
<div class="console" id="console"></div>
</div>
</div>

<!-- ACCOUNTS -->
<div id="accounts" class="page">
<div class="card">
<div class="title">Accounts</div>
<table>
<thead><tr><th>ID</th><th>Phone</th><th>Status</th><th>Flood</th></tr></thead>
<tbody id="accountsTable"></tbody>
</table>
</div>
</div>

<!-- HISTORY -->
<div id="history" class="page">
<div class="card">
<div class="title">History</div>
<ul id="historyList"></ul>
</div>
</div>

</div>

<script>
// NAV
document.querySelectorAll(".tab").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"))
    btn.classList.add("active")
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
    document.getElementById(btn.dataset.page).classList.add("active")
  }
})

// ===== Accounts =====
async function loadAccounts(){
  const res=await fetch("/account-status")
  const data=await res.json()
  const table=document.getElementById("accountsTable")
  table.innerHTML=""

  Object.keys(data).forEach(id=>{
    const a=data[id]
    let flood="-"
    if(a.floodWaitUntil && a.floodWaitUntil>Date.now()){
      flood=Math.floor((a.floodWaitUntil-Date.now())/1000)+"s"
    }

    table.innerHTML+=`
    <tr>
      <td>${id}</td>
      <td>${a.phone}</td>
      <td>${a.status}</td>
      <td>${flood}</td>
    </tr>`
  })
}
setInterval(loadAccounts,2000)
loadAccounts()

// ===== History =====
let historySet=new Set()

async function loadHistory(){
  const res=await fetch("/history")
  const data=await res.json()
  const box=document.getElementById("historyList")
  box.innerHTML=""
  historySet.clear()

  Object.values(data).slice(-100).reverse().forEach(h=>{
    const key=h.username||h.user_id
    if(h.status==="success") historySet.add(key)

    box.innerHTML+=`<li class="${h.status}">${key} → ${h.status}</li>`
  })
}
setInterval(loadHistory,3000)
loadHistory()

// ===== Auto Add =====
const startBtn=document.getElementById("start")
const status=document.getElementById("status")
const counter=document.getElementById("counter")
const progress=document.getElementById("progress")
const list=document.getElementById("list")
const consoleBox=document.getElementById("console")

let offset=0,total=0,accIndex=0

function log(msg){
  consoleBox.innerHTML+=msg+"<br>"
  consoleBox.scrollTop=consoleBox.scrollHeight
}

async function getAccounts(){
  const res=await fetch("/account-status")
  return await res.json()
}

function nextAccount(data,index){
  const now=Date.now()
  const keys=Object.keys(data)
  for(let i=0;i<keys.length;i++){
    let idx=(index+i)%keys.length
    let acc=data[keys[idx]]
    if(acc.status==="active" && (!acc.floodWaitUntil || acc.floodWaitUntil<now)){
      return {id:keys[idx], index:idx}
    }
  }
  return null
}

startBtn.onclick=async()=>{
  const source=document.getElementById("source").value.trim()
  const target=document.getElementById("target").value.trim()
  if(!source||!target) return alert("Enter group")

  offset=0; total=0; accIndex=0
  list.innerHTML=""; consoleBox.innerHTML=""

  while(true){

    status.innerText="Fetching 10..."
    const res=await fetch("/members",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({group:source, offset, limit:10})
    })

    const data=await res.json()
    if(data.error){alert(data.error); break}

    const members=data.members||[]
    if(members.length===0){
      status.innerText="Done"
      break
    }

    offset=data.nextOffset
    const accounts=await getAccounts()

    for(const m of members){
      const key=m.username||m.user_id

      if(historySet.has(key)){
        log(`SKIP ${key}`)
        continue
      }

      const acc=nextAccount(accounts,accIndex)
      if(!acc){await new Promise(r=>setTimeout(r,5000)); continue}

      accIndex=acc.index

      log(`${acc.id} → ${key}`)

      const addRes=await fetch("/add-member",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({...m,targetGroup:target})
      })

      const result=await addRes.json()

      list.innerHTML+=`<li class="${result.status}">${key} → ${result.status}</li>`

      total++
      counter.innerText=total
      progress.style.width=(total%100)+"%"

      if(result.status==="success"){
        historySet.add(key)
        accIndex++
      }
    }

    let wait=30
    while(wait--){
      status.innerText=`Next batch in ${wait}s`
      await new Promise(r=>setTimeout(r,1000))
    }
  }
}
</script>

</body>
</html>
