<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:#0f0f10;color:#fff;margin:0;}
.container{max-width:1000px;margin:auto;padding:15px;}
nav{background:#111;padding:10px;border-radius:10px;display:flex;gap:10px;margin-bottom:20px;}
nav button{background:#00ff7f;color:#000;font-weight:700;padding:10px;border:none;border-radius:10px;cursor:pointer;}
nav button.active, nav button:hover{background:#00cc66;color:#fff;}
section{background:#1e1e2a;border-radius:20px;padding:20px;margin-bottom:20px;display:none;}
section.active{display:block;}
.card-title{font-size:22px;font-weight:700;color:#00ff7f;text-align:center;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:10px;border-radius:10px;background:#111;color:#fff;border:none;}
button.main-btn{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#00ff7f;font-weight:700;cursor:pointer;}
button.main-btn:hover{background:#00cc66;color:#fff;}
.success{color:#00ff7f;}
.failed{color:#ff4c4c;}
.avatar{width:25px;height:25px;border-radius:50%;}
ul{list-style:none;padding:0;max-height:300px;overflow-y:auto;}
.console{background:#111;padding:10px;border-radius:10px;height:150px;overflow:auto;font-size:12px;}
.progress-bar{background:#111;height:10px;border-radius:10px;margin-top:10px;}
.progress{background:#00ff7f;height:10px;width:0%;border-radius:10px;}
.summary{display:flex;gap:20px;margin-top:10px;font-weight:700;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
table th, table td{padding:8px;text-align:left;border-bottom:1px solid #333;}
</style>
</head>
<body>

<div class="container">

<!-- Nav Bar -->
<nav>
  <button class="tab-btn active" data-target="autoAdd">Auto Add</button>
  <button class="tab-btn" data-target="history">History</button>
  <button class="tab-btn" data-target="accounts">Accounts</button>
</nav>

<!-- Sections -->
<section id="autoAdd" class="active">
  <div class="card-title">Auto Add Members</div>
  <input id="source" placeholder="Source Group">
  <input id="target" placeholder="Target Group">

  <div class="summary">
    <div>Total: <span id="total">0</span></div>
    <div>Success: <span id="success">0</span></div>
    <div>Failed: <span id="failed">0</span></div>
  </div>

  <div class="progress-bar"><div id="progress" class="progress"></div></div>

  <ul id="list"></ul>
  <div class="console" id="console"></div>

  <button id="start" class="main-btn">START AUTO ADD</button>
  <button id="clear" class="main-btn">CLEAR LOGS</button>
</section>

<section id="history">
  <div class="card-title">History</div>
  <table id="historyTable">
    <thead>
      <tr>
        <th>Username/UserID</th>
        <th>Status</th>
        <th>Account Used</th>
        <th>Timestamp</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <button id="refreshHistory" class="main-btn">Refresh History</button>
</section>

<section id="accounts">
  <div class="card-title">Accounts Table</div>
  <table id="accountsTable">
    <thead>
      <tr>
        <th>Phone</th>
        <th>Status</th>
        <th>FloodWait Until</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <button id="refreshAccounts" class="main-btn">Refresh Accounts</button>
</section>

</div>

<script>
// ===== Tab Switch =====
const tabs = document.querySelectorAll('.tab-btn')
const sections = document.querySelectorAll('section')
tabs.forEach(tab=>{
  tab.addEventListener('click', ()=>{
    tabs.forEach(t=>t.classList.remove('active'))
    tab.classList.add('active')
    sections.forEach(sec=>sec.classList.remove('active'))
    document.getElementById(tab.dataset.target).classList.add('active')
  })
})

// ===== Auto Add Logic (simplified) =====
const startBtn = document.getElementById("start")
const clearBtn = document.getElementById("clear")
const totalBox = document.getElementById("total")
const successBox = document.getElementById("success")
const failedBox = document.getElementById("failed")
const progress = document.getElementById("progress")
const list = document.getElementById("list")
const consoleBox = document.getElementById("console")
let total=0, success=0, failed=0, offset=0

function log(msg){
  consoleBox.innerHTML += msg+"<br>"
  consoleBox.scrollTop = consoleBox.scrollHeight
}

// For brevity, re-use your previous batch Auto Add code here
startBtn.onclick = async ()=>{
  alert("Auto Add logic goes here (reuse previous batch code)")
}
clearBtn.onclick = ()=>{
  list.innerHTML = ""
  consoleBox.innerHTML = ""
  totalBox.innerText = successBox.innerText = failedBox.innerText = "0"
  progress.style.width = "0%"
}

// ===== History Section =====
const historyTableBody = document.querySelector("#historyTable tbody")
document.getElementById("refreshHistory").onclick = async ()=>{
  const res = await fetch("/history")
  const data = await res.json()
  historyTableBody.innerHTML = ""
  Object.values(data).forEach(item=>{
    const tr = document.createElement("tr")
    tr.innerHTML = `
      <td>${item.username||item.user_id}</td>
      <td>${item.status}</td>
      <td>${item.accountUsed}</td>
      <td>${new Date(item.timestamp).toLocaleString()}</td>
    `
    historyTableBody.appendChild(tr)
  })
}

// ===== Accounts Section =====
const accountsTableBody = document.querySelector("#accountsTable tbody")
document.getElementById("refreshAccounts").onclick = async ()=>{
  const res = await fetch("/account-status")
  const data = await res.json()
  accountsTableBody.innerHTML = ""
  Object.values(data).forEach(acc=>{
    const tr = document.createElement("tr")
    tr.innerHTML = `
      <td>${acc.phone}</td>
      <td>${acc.status}</td>
      <td>${acc.floodWaitUntil ? new Date(acc.floodWaitUntil).toLocaleString() : "-"}</td>
    `
    accountsTableBody.appendChild(tr)
  })
}
</script>

</body>
</html>
