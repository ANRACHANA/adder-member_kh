<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:#0f0f10;color:#fff;margin:0;}
.container{max-width:1000px;margin:auto;padding:15px;}
nav{background:#111;padding:10px;border-radius:10px;display:flex;gap:10px;margin-bottom:20px;}
nav button{background:#00ff7f;color:#000;font-weight:700;padding:10px;border:none;border-radius:10px;cursor:pointer;}
nav button:hover{background:#00cc66;color:#fff;}
section{background:#1e1e2a;border-radius:20px;padding:20px;margin-bottom:20px;}
.card-title{font-size:22px;font-weight:700;color:#00ff7f;text-align:center;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:10px;border-radius:10px;background:#111;color:#fff;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#00ff7f;font-weight:700;cursor:pointer;}
button:hover{background:#00cc66;color:#fff;}
.success{color:#00ff7f;}
.failed{color:#ff4c4c;}
.avatar{width:25px;height:25px;border-radius:50%;}
ul{list-style:none;padding:0;max-height:300px;overflow-y:auto;}
.console{background:#111;padding:10px;border-radius:10px;height:150px;overflow:auto;font-size:12px;}
.progress-bar{background:#111;height:10px;border-radius:10px;margin-top:10px;}
.progress{background:#00ff7f;height:10px;width:0%;border-radius:10px;}
.summary{display:flex;gap:20px;margin-top:10px;font-weight:700;}
</style>
</head>
<body>

<div class="container">

<nav>
  <button id="start">START AUTO ADD</button>
  <button id="clear">CLEAR LOGS</button>
</nav>

<section>
<div class="card-title">Auto Add Members</div>

<input id="source" placeholder="Source Group">
<input id="target" placeholder="Target Group">

<div class="summary">
  <div>Total: <span id="total">0</span></div>
  <div>Success: <span id="success">0</span></div>
  <div>Failed: <span id="failed">0</span></div>
</div>

<div class="progress-bar"><div id="progress" class="progress"></div></div>

<ul id="list"></ul>
<div class="console" id="console"></div>

</section>
</div>

<script>
const startBtn = document.getElementById("start")
const clearBtn = document.getElementById("clear")
const totalBox = document.getElementById("total")
const successBox = document.getElementById("success")
const failedBox = document.getElementById("failed")
const progress = document.getElementById("progress")
const list = document.getElementById("list")
const consoleBox = document.getElementById("console")

let total=0, success=0, failed=0, offset=0

function log(msg){
  consoleBox.innerHTML += msg+"<br>"
  consoleBox.scrollTop = consoleBox.scrollHeight
}

async function getMembers(source){
  const res = await fetch("/members",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({group:source, offset, limit:20})
  })
  return await res.json()
}

async function checkHistoryBatch(members){
  const res = await fetch("/check-history",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({members})
  })
  const data = await res.json()
  return data.checked || []
}

async function addMember(m){
  const res = await fetch("/add-member",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(m)
  })
  return await res.json()
}

startBtn.onclick = async ()=>{
  const source = document.getElementById("source").value.trim()
  const target = document.getElementById("target").value.trim()
  if(!source || !target) return alert("Enter group")

  offset = 0
  total = success = failed = 0
  list.innerHTML = ""
  consoleBox.innerHTML = ""
  totalBox.innerText = successBox.innerText = failedBox.innerText = "0"

  while(true){
    log(`Fetching 20 members from ${source}...`)
    const data = await getMembers(source)
    if(data.error){ log(data.error); break }
    if(!data.members.length){ log("No more members."); break }

    offset = data.nextOffset

    // ===== Batch check history =====
    const checked = await checkHistoryBatch(data.members)
    const toAdd = checked.filter(m=>!m.exists)

    log(`Batch size: ${data.members.length}, to add: ${toAdd.length}`)

    for(const m of toAdd){
      const result = await addMember({...m, targetGroup:target})
      const li = document.createElement("li")
      li.innerHTML = `
        <img class="avatar" src="${m.avatar}" onerror="this.src='https://via.placeholder.com/40?text=U'">
        ${m.username||m.user_id}
        → <span class="${result.status==="success"?"success":"failed"}">${result.status}</span>
        (${result.accountUsed})
      `
      list.appendChild(li)

      total++
      totalBox.innerText = total

      if(result.status==="success") success++ 
      else failed++
      successBox.innerText = success
      failedBox.innerText = failed

      progress.style.width = Math.min((total%100),100)+"%"
    }
  }

  log("✅ Finished Auto Add")
}

clearBtn.onclick = ()=>{
  list.innerHTML = ""
  consoleBox.innerHTML = ""
  totalBox.innerText = successBox.innerText = failedBox.innerText = "0"
  progress.style.width = "0%"
}
</script>

</body>
</html>
