<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#0f0f10;color:#fff;margin:0;}
.container{max-width:1100px;margin:auto;padding:15px;}
.nav{display:flex;background:#111;padding:10px;gap:10px;}
.nav button{flex:1;padding:10px;background:#222;border:none;color:#fff;cursor:pointer;}
.nav button.active{background:#00ff7f;color:#000;font-weight:bold;}
.page{display:none;}
.page.active{display:block;}
section{background:#1e1e2a;border-radius:10px;padding:15px;margin-top:10px;}
table{width:100%;border-collapse:collapse;}
td,th{padding:8px;border-bottom:1px solid #333;}
th{color:#00ff7f;}
.success{color:#00ff7f;}
.failed{color:#ff4c4c;}
.skipped{color:#9999ff;}
.console{background:#111;height:150px;overflow:auto;padding:10px;border-radius:10px;font-size:12px;}
.progress{height:10px;background:#00ff7f;width:0%;border-radius:10px;}
.bar{background:#111;border-radius:10px;margin-top:10px;}
.avatar{width:25px;height:25px;border-radius:50%;}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button class="tab active" data-page="auto">Auto Add</button>
<button class="tab" data-page="accounts">Accounts</button>
<button class="tab" data-page="history">History</button>
</div>

<div class="container">

<!-- AUTO ADD -->
<div id="auto" class="page active">
<section>
<h3>Auto Add Members</h3>
<input id="source" placeholder="Source Group">
<input id="target" placeholder="Target Group">
<button id="start">START</button>

<div id="status"></div>
<div id="counter">0</div>
<div class="bar"><div id="progress" class="progress"></div></div>

<ul id="list"></ul>
<div class="console" id="console"></div>
</section>
</div>

<!-- ACCOUNTS -->
<div id="accounts" class="page">
<section>
<h3>Accounts</h3>
<table>
<thead><tr><th>ID</th><th>Phone</th><th>Status</th><th>FloodWait</th></tr></thead>
<tbody id="accountsTable"></tbody>
</table>
</section>
</div>

<!-- HISTORY -->
<div id="history" class="page">
<section>
<h3>History</h3>
<ul id="historyList"></ul>
</section>
</div>

</div>

<script>
// ===== NAV =====
document.querySelectorAll(".tab").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"))
    btn.classList.add("active")
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
    document.getElementById(btn.dataset.page).classList.add("active")
  }
})

// ===== LOAD ACCOUNTS =====
async function loadAccounts(){
  const res=await fetch("/account-status")
  const data=await res.json()
  const table=document.getElementById("accountsTable")
  table.innerHTML=""

  Object.keys(data).forEach(id=>{
    const a=data[id]
    let flood="-"
    if(a.floodWaitUntil && a.floodWaitUntil>Date.now()){
      flood=Math.floor((a.floodWaitUntil-Date.now())/1000)+"s"
    }
    table.innerHTML+=`
    <tr>
      <td>${id}</td>
      <td>${a.phone}</td>
      <td>${a.status}</td>
      <td>${flood}</td>
    </tr>`
  })
}
setInterval(loadAccounts,2000)
loadAccounts()

// ===== LOAD HISTORY =====
let historySet = new Set()

async function loadHistory(){
  const res=await fetch("/history")
  const data=await res.json()
  const box=document.getElementById("historyList")
  box.innerHTML=""

  historySet.clear()

  Object.values(data).slice(-100).reverse().forEach(h=>{
    const key = h.username || h.user_id
    if(h.status==="success") historySet.add(key)

    box.innerHTML+=`
    <li class="${h.status}">
      ${key} → ${h.status}
      <br><small>${h.reason}</small>
    </li>`
  })
}
setInterval(loadHistory,3000)
loadHistory()

// ===== AUTO ADD =====
const startBtn=document.getElementById("start")
const status=document.getElementById("status")
const counter=document.getElementById("counter")
const progress=document.getElementById("progress")
const list=document.getElementById("list")
const consoleBox=document.getElementById("console")

let offset=0,total=0,accIndex=0

function log(msg){
  consoleBox.innerHTML+=msg+"<br>"
  consoleBox.scrollTop=consoleBox.scrollHeight
}

async function getAccounts(){
  const res=await fetch("/account-status")
  return await res.json()
}

function nextAccount(data,index){
  const now=Date.now()
  const keys=Object.keys(data)
  for(let i=0;i<keys.length;i++){
    let idx=(index+i)%keys.length
    let acc=data[keys[idx]]
    if(acc.status==="active" && (!acc.floodWaitUntil || acc.floodWaitUntil<now)){
      return {id:keys[idx], index:idx}
    }
  }
  return null
}

// ===== START AUTO ADD =====
startBtn.onclick=async()=>{
  const source=document.getElementById("source").value.trim()
  const target=document.getElementById("target").value.trim()
  if(!source||!target) return alert("Enter group")

  offset=0; total=0; accIndex=0
  list.innerHTML=""; consoleBox.innerHTML=""

  while(true){

    status.innerText="Fetching 10..."
    const res=await fetch("/members",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({group:source, offset, limit:10})
    })

    const data=await res.json()
    if(data.error){alert(data.error); break}

    const members=data.members||[]
    if(members.length===0){
      status.innerText="No more members"
      break
    }

    offset=data.nextOffset
    const accounts=await getAccounts()

    for(const m of members){
      const key = m.username || m.user_id

      // ===== 🔥 SKIP HISTORY (NO DELAY) =====
      if(historySet.has(key)){
        log(`SKIP history → ${key}`)
        list.innerHTML+=`<li class="skipped">${key} → skipped</li>`
        total++
        counter.innerText=total
        progress.style.width=(total%100)+"%"
        continue
      }

      const acc=nextAccount(accounts,accIndex)

      if(!acc){
        status.innerText="All accounts FloodWait..."
        await new Promise(r=>setTimeout(r,5000))
        continue
      }

      accIndex=acc.index
      log(`${acc.id} → ${key}`)

      const addRes=await fetch("/add-member",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          username:m.username,
          user_id:m.user_id,
          access_hash:m.access_hash,
          targetGroup:target
        })
      })

      const result=await addRes.json()

      list.innerHTML+=`
      <li class="${result.status}">
        ${key} → ${result.status}
      </li>`

      total++
      counter.innerText=total
      progress.style.width=(total%100)+"%"

      if(result.status==="success"){
        historySet.add(key)
        accIndex++
      }
    }

    // ===== Batch delay =====
    let wait=30
    while(wait--){
      status.innerText=`Next batch in ${wait}s`
      await new Promise(r=>setTimeout(r,1000))
    }
  }

  status.innerText="Finished ✅"
}
</script>

</body>
</html>
