<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:#0f0f10;color:#fff;margin:0;}
.container{max-width:1000px;margin:auto;padding:15px;}
section{background:#1e1e2a;border-radius:20px;padding:20px;margin-bottom:20px;}
.card-title{font-size:22px;font-weight:700;color:#00ff7f;text-align:center;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:10px;border-radius:10px;background:#111;color:#fff;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#00ff7f;font-weight:700;cursor:pointer;}
button:hover{background:#00cc66;color:#fff;}
.success{color:#00ff7f;}
.failed{color:#ff4c4c;}
.avatar{width:25px;height:25px;border-radius:50%;vertical-align:middle;margin-right:5px;}
ul{list-style:none;padding:0;max-height:300px;overflow-y:auto;}
.console{background:#111;padding:10px;border-radius:10px;height:150px;overflow:auto;font-size:12px;}
.progress-bar{background:#111;height:10px;border-radius:10px;margin-top:10px;}
.progress{background:#00ff7f;height:10px;width:0%;border-radius:10px;}
.dashboard{display:flex;justify-content:space-around;margin-top:10px;}
.dashboard div{background:#111;padding:10px;border-radius:10px;width:30%;text-align:center;}
</style>
</head>
<body>

<div class="container">

<section>
<div class="card-title">Auto Add Members</div>

<div style="display:flex;gap:10px;">
<input id="source" placeholder="Source Group">
<input id="target" placeholder="Target Group">
</div>

<div style="display:flex;gap:10px;margin-top:10px;">
<button id="start">START AUTO ADD</button>
<button id="historyBtn">HISTORY / SUMMARY</button>
</div>

<div class="dashboard">
  <div>Success: <span id="totalSuccess">0</span></div>
  <div>Failed: <span id="totalFailed">0</span></div>
  <div>Skipped: <span id="totalSkipped">0</span></div>
</div>

<div id="status"></div>
<div id="counter">0</div>
<div class="progress-bar"><div id="progress" class="progress"></div></div>

<ul id="list"></ul>
<div class="console" id="console"></div>

</section>

</div>

<script>
const startBtn = document.getElementById("start");
const historyBtn = document.getElementById("historyBtn");
const status = document.getElementById("status");
const counter = document.getElementById("counter");
const progress = document.getElementById("progress");
const list = document.getElementById("list");
const consoleBox = document.getElementById("console");

const totalSuccessEl = document.getElementById("totalSuccess");
const totalFailedEl = document.getElementById("totalFailed");
const totalSkippedEl = document.getElementById("totalSkipped");

let offset = 0;
let total = 0;
let accIndex = 0;

let successCount = 0;
let failedCount = 0;
let skippedCount = 0;

function log(msg){
  consoleBox.innerHTML += msg + "<br>";
  consoleBox.scrollTop = consoleBox.scrollHeight;
}

async function getAccounts(){
  const res = await fetch("/account-status");
  return await res.json();
}

function nextAccount(data,index){
  const now = Date.now();
  const keys = Object.keys(data);
  for(let i=0;i<keys.length;i++){
    let idx=(index+i)%keys.length;
    let acc = data[keys[idx]];
    if(acc.status==="active" && (!acc.floodWaitUntil || acc.floodWaitUntil<now)){
      return {id: keys[idx], index: idx};
    }
  }
  return null;
}

startBtn.onclick = async () => {
  const source = document.getElementById("source").value.trim();
  const target = document.getElementById("target").value.trim();
  if(!source||!target) return alert("Enter group");

  offset = 0;
  total = 0;
  accIndex = 0;
  successCount = 0;
  failedCount = 0;
  skippedCount = 0;
  list.innerHTML = "";
  consoleBox.innerHTML = "";
  totalSuccessEl.innerText = 0;
  totalFailedEl.innerText = 0;
  totalSkippedEl.innerText = 0;

  while(true){
    status.innerText = "Fetching 10 members...";
    const res = await fetch("/members",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({group:source, offset, limit:10})
    });
    const data = await res.json();
    if(data.error){ alert(data.error); break; }

    const members = data.members || [];
    if(members.length===0){ status.innerText="No more members"; break; }

    offset = data.nextOffset;

    const accountsData = await getAccounts();
    status.innerText = "Adding batch...";

    for(const m of members){
      const acc = nextAccount(accountsData, accIndex);
      if(!acc){
        status.innerText="All accounts FloodWait...";
        await new Promise(r=>setTimeout(r,5000));
        continue;
      }
      accIndex = acc.index;

      const nowTime = new Date().toLocaleTimeString();
      log(`[${nowTime}] ${acc.id} → ${m.username||m.user_id}`);

      const addRes = await fetch("/add-member",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          username: m.username,
          user_id: m.user_id,
          access_hash: m.access_hash,
          targetGroup: target
        })
      });

      const result = await addRes.json();

      const li = document.createElement("li");
      li.innerHTML = `
        <img class="avatar" src="${m.avatar}" onerror="this.src='https://via.placeholder.com/40?text=U'">
        ${m.username||m.user_id} → <span class="${result.status==="success"?"success":"failed"}">${result.status}</span>
        (${acc.id})
      `;
      list.appendChild(li);

      total++;
      counter.innerText = total;
      progress.style.width = (total%100)+"%";

      // ===== Update Dashboard & Switch Account =====
      if(result.status==="success"){
        successCount++;
        totalSuccessEl.innerText = successCount;

        // Delay 20s countdown
        let delay = 20;
        while(delay>0){
          status.innerText = `Next add in ${delay}s...`;
          await new Promise(r=>setTimeout(r,1000));
          delay--;
        }
        // Switch to next account
        accIndex = (accIndex + 1) % Object.keys(accountsData).length;
      } else {
        failedCount++;
        totalFailedEl.innerText = failedCount;
      }
    }
  }

  status.innerText = "Finished ✅";
};

// ===== History / Summary =====
historyBtn.onclick = async () => {
  const res = await fetch("/history");
  const data = await res.json();
  consoleBox.innerHTML = "";
  successCount = 0; failedCount = 0; skippedCount = 0;

  for(const key in data){
    const h = data[key];
    // Only show success in console & count
    const li = document.createElement("li");
    li.innerHTML = `
      <img class="avatar" src="https://via.placeholder.com/40?text=U">
      ${h.username||h.user_id} → <span class="${h.status==="success"?"success":"failed"}">${h.status}</span>
      (${h.accountUsed})
    `;
    list.appendChild(li);

    if(h.status==="success") successCount++;
    else failedCount++;
  }

  totalSuccessEl.innerText = successCount;
  totalFailedEl.innerText = failedCount;
  totalSkippedEl.innerText = skippedCount;
  status.innerText = `History Loaded ✅`;
};
</script>

</body>
</html>
