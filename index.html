<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'JetBrains Mono',monospace;background:#0f0f10;color:#fff;}
.navbar{background:#111;padding:10px;display:flex;gap:5px;border-bottom:2px solid #00ff7f;position:sticky;top:0;z-index:100;}
.navbar button{padding:8px 12px;border:none;border-radius:10px;background:#00ff7f;color:#000;font-weight:700;cursor:pointer;}
.navbar button:hover{background:#00cc66;color:#fff;}
.page{display:none;padding:20px;}
.active{display:block;}
input,select{width:100%;padding:10px;margin-top:10px;border-radius:10px;background:#111;color:#fff;border:none;}
button.mainBtn{padding:10px 15px;margin-top:10px;border:none;border-radius:10px;background:#00ff7f;font-weight:700;cursor:pointer;}
button.mainBtn:hover{background:#00cc66;color:#fff;}
.success{color:#00ff7f;}
.failed{color:#ff4c4c;}
.skip{color:#999;}
.avatar{width:25px;height:25px;border-radius:50%;}
ul{list-style:none;padding:0;max-height:300px;overflow-y:auto;}
.console{background:#111;padding:10px;border-radius:10px;height:150px;overflow:auto;font-size:12px;}
.progress-bar{background:#111;height:10px;border-radius:10px;margin-top:10px;}
.progress{background:#00ff7f;height:10px;width:0%;border-radius:10px;}
.history-table, .accounts-table{width:100%;border-collapse:collapse;margin-top:10px;}
.history-table th,.history-table td,.accounts-table th,.accounts-table td{border:1px solid #333;padding:5px;text-align:center;font-size:12px;}
.summary{margin-top:10px;padding:10px;background:#111;border-radius:10px;}
.summary span{display:inline-block;margin-right:15px;}
</style>
</head>
<body>

<div class="navbar">
  <button onclick="showPage('autoAddPage')">🚀 Auto Add</button>
  <button onclick="showPage('historyPage')">📜 History</button>
  <button onclick="showPage('accountsPage')">👥 Accounts</button>
</div>

<!-- Auto Add Page -->
<div id="autoAddPage" class="page active">
  <h2>Auto Add Members</h2>
  <input id="source" placeholder="Source Group">
  <input id="target" placeholder="Target Group">
  <button id="start" class="mainBtn">START AUTO ADD</button>
  <div class="progress-bar"><div id="progress" class="progress"></div></div>
  <div id="status"></div>
  <div id="counter">0</div>
  <ul id="list"></ul>
  <div class="console" id="console"></div>
  <div class="summary" id="liveSummary">
    <span>Success: <b id="liveSuccess">0</b></span>
    <span>Failed: <b id="liveFailed">0</b></span>
    <span>Skipped: <b id="liveSkipped">0</b></span>
  </div>
</div>

<!-- History Page -->
<div id="historyPage" class="page">
  <h2>History & Summary</h2>
  <div class="summary" id="summary">
    <span>Total Success: <b id="totalSuccess">0</b></span>
    <span>Total Failed: <b id="totalFailed">0</b></span>
    <span>Total Skipped: <b id="totalSkipped">0</b></span>
  </div>
  <table class="history-table" id="historyTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Username / ID</th>
        <th>Status</th>
        <th>Account</th>
        <th>Reason</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- Accounts Page -->
<div id="accountsPage" class="page">
  <h2>Accounts Dashboard</h2>
  <table class="accounts-table" id="accountsTable">
    <thead>
      <tr>
        <th>Phone</th>
        <th>Status</th>
        <th>FloodWait Until</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <button class="mainBtn" onclick="loadAccounts()">Refresh Accounts</button>
</div>

<script>
function showPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.getElementById(pageId).classList.add('active')
}

// ===== Fetch Accounts =====
async function getAccounts(){
  const res=await fetch("/account-status")
  return await res.json()
}

// ===== Load accounts table =====
async function loadAccounts(){
  const accounts=await getAccounts()
  const table=document.getElementById("accountsTable").querySelector("tbody")
  table.innerHTML=""
  Object.values(accounts).forEach(acc=>{
    const tr=document.createElement("tr")
    tr.innerHTML=`<td>${acc.phone}</td>
                  <td class="${acc.status==='active'?'success':acc.status==='floodwait'?'skip':'failed'}">${acc.status}</td>
                  <td>${acc.floodWaitUntil?new Date(acc.floodWaitUntil).toLocaleString():'-'}</td>`
    table.appendChild(tr)
  })
}

// ===== Fetch history =====
async function fetchHistory(){
  const res=await fetch("/history")
  const data=await res.json()
  const tbody=document.getElementById("historyTable").querySelector("tbody")
  tbody.innerHTML=""
  let success=0, failed=0, skipped=0
  Object.values(data).forEach(entry=>{
    const tr=document.createElement("tr")
    tr.innerHTML=`<td>${new Date(entry.timestamp || Date.now()).toLocaleString()}</td>
                  <td>${entry.username||entry.user_id}</td>
                  <td class="${entry.status==='success'?'success':entry.status==='skip'?'skip':'failed'}">${entry.status}</td>
                  <td>${entry.accountUsed||'-'}</td>
                  <td>${entry.reason||'-'}</td>`
    tbody.appendChild(tr)
    if(entry.status==='success') success++
    else if(entry.status==='failed') failed++
    else if(entry.status==='skip') skipped++
  })
  document.getElementById("totalSuccess").innerText=success
  document.getElementById("totalFailed").innerText=failed
  document.getElementById("totalSkipped").innerText=skipped
}

// ===== Auto Add JS =====
const startBtn=document.getElementById("start")
const status=document.getElementById("status")
const counter=document.getElementById("counter")
const progress=document.getElementById("progress")
const list=document.getElementById("list")
const consoleBox=document.getElementById("console")
let liveSuccess=0, liveFailed=0, liveSkipped=0

function log(msg){ consoleBox.innerHTML+=msg+"<br>"; consoleBox.scrollTop=consoleBox.scrollHeight }

startBtn.onclick=async()=>{
  const source=document.getElementById("source").value.trim()
  const target=document.getElementById("target").value.trim()
  if(!source||!target) return alert("Enter group")

  let offset=0, total=0
  list.innerHTML=""
  consoleBox.innerHTML=""
  liveSuccess=0; liveFailed=0; liveSkipped=0

  while(true){
    status.innerText="Fetching 10 members..."
    const res=await fetch("/members",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({group:source, offset, limit:10})
    })
    const data=await res.json()
    if(data.error){ alert(data.error); break }
    const members=data.members||[]
    if(members.length===0){ status.innerText="No more members"; break }
    offset=data.nextOffset

    for(const m of members){
      // ===== Skip if already in history =====
      const checkRes = await fetch("/check-history",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username:m.username,user_id:m.user_id})
      })
      const checkData=await checkRes.json()
      if(checkData.exists){
        liveSkipped++; document.getElementById("liveSkipped").innerText=liveSkipped
        const li=document.createElement("li")
        li.innerHTML=`<img class="avatar" src="${m.avatar}" onerror="this.src='https://via.placeholder.com/40?text=U'">
                      ${m.username||m.user_id} → <span class="skip">skipped</span>`
        list.appendChild(li)
        continue
      }

      // ===== Add member =====
      const addRes=await fetch("/add-member",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          username:m.username,
          user_id:m.user_id,
          access_hash:m.access_hash,
          targetGroup:target
        })
      })
      const result=await addRes.json()
      const li=document.createElement("li")
      li.innerHTML=`<img class="avatar" src="${m.avatar}" onerror="this.src='https://via.placeholder.com/40?text=U'">
                    ${m.username||m.user_id} → <span class="${result.status==='success'?'success':'failed'}">${result.status}</span>
                    (${result.accountUsed||'-'})`
      list.appendChild(li)

      total++; counter.innerText=total
      progress.style.width=(total%100)+"%"

      if(result.status==='success') liveSuccess++
      else liveFailed++
      document.getElementById("liveSuccess").innerText=liveSuccess
      document.getElementById("liveFailed").innerText=liveFailed
    }
  }

  status.innerText="Finished ✅"
  fetchHistory() // refresh history page summary
}
</script>

</body>
</html>
