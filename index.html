<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{margin:0;background:#0f0f10;color:#fff;font-family:'JetBrains Mono',monospace;}
.container{max-width:1200px;margin:auto;padding:15px;}

nav{display:flex;gap:10px;margin-bottom:15px;}
nav button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  background:#1e1e2a;
  color:#00ff7f;
}
nav button.active{background:#00ff7f;color:#000;}

section{background:#1e1e2a;padding:15px;border-radius:15px;margin-bottom:15px;}
.card-title{text-align:center;color:#00ff7f;font-size:20px;margin-bottom:10px;}

input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  margin-top:10px;
}

.btn-row{display:flex;gap:10px;margin-top:10px;}
.btn-row button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.start{background:#00ff7f;color:#000;}
.stop{background:#ff4c4c;color:#fff;}
.clear{background:#555;color:#fff;}

.summary{display:flex;gap:15px;margin-top:10px;font-weight:700;}
.progress-bar{background:#111;height:10px;border-radius:10px;margin-top:10px;}
.progress{background:#00ff7f;height:10px;width:0%;border-radius:10px;}

ul{list-style:none;padding:0;max-height:300px;overflow:auto;}
.avatar{width:30px;height:30px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.success{color:#00ff7f;}
.failed{color:#ff4c4c;}

.console{background:#111;padding:10px;border-radius:10px;height:120px;overflow:auto;font-size:12px;margin-top:10px;}

.account-dashboard{display:flex;flex-wrap:wrap;gap:10px;}
.account-card{padding:10px;border-radius:12px;width:180px;color:#000;}
.active-card{background:#00ff7f;}
.flood-card{background:#ffcc00;}
.error-card{background:#ff4c4c;}
</style>
</head>

<body>
<div class="container">

<!-- NAV -->
<nav>
  <button id="tabAuto" class="active">AUTO ADD</button>
  <button id="tabHistory">HISTORY</button>
  <button id="tabAccounts">ACCOUNTS</button>
</nav>

<!-- AUTO -->
<section id="autoSection">
<div class="card-title">Auto Add Members</div>

<input id="source" placeholder="Source Group">
<input id="target" placeholder="Target Group">

<div class="btn-row">
  <button id="start" class="start">🚀 START</button>
  <button id="stop" class="stop">⛔ STOP</button>
  <button id="clear" class="clear">🧹 CLEAR</button>
</div>

<div class="summary">
  <div>Total: <span id="total">0</span></div>
  <div>Success: <span id="success">0</span></div>
  <div>Failed: <span id="failed">0</span></div>
</div>

<div class="progress-bar">
  <div id="progress" class="progress"></div>
</div>

<ul id="list"></ul>
<div class="console" id="console"></div>
</section>

<!-- HISTORY -->
<section id="historySection" style="display:none;">
<div class="card-title">History</div>
<ul id="historyList"></ul>
</section>

<!-- ACCOUNTS -->
<section id="accountSection" style="display:none;">
<div class="card-title">Accounts Dashboard</div>
<div id="accounts" class="account-dashboard"></div>
</section>

</div>

<script>
let running=false
let offset=0,total=0,success=0,failed=0

const logBox=document.getElementById("console")
function log(msg){
  logBox.innerHTML+=msg+"<br>"
  logBox.scrollTop=logBox.scrollHeight
}

// TABS
tabAuto.onclick=()=>show("auto")
tabHistory.onclick=()=>{show("history");loadHistory()}
tabAccounts.onclick=()=>{show("accounts");loadAccounts()}

function show(tab){
  autoSection.style.display=tab==="auto"?"block":"none"
  historySection.style.display=tab==="history"?"block":"none"
  accountSection.style.display=tab==="accounts"?"block":"none"
}

// API
async function getMembers(group){
  const r=await fetch("/members",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({group,offset,limit:20})})
  return await r.json()
}

async function checkHistory(members){
  const r=await fetch("/check-history",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({members})})
  return (await r.json()).checked
}

async function addMember(m){
  const r=await fetch("/add-member",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(m)})
  return await r.json()
}

// START
start.onclick=async()=>{
  running=true
  offset=0
  total=success=failed=0
  list.innerHTML=""
  logBox.innerHTML=""

  const source=source.value.trim()
  const target=target.value.trim()
  if(!source||!target) return alert("Enter group")

  while(running){
    const data=await getMembers(source)
    if(!data.members.length) break

    offset=data.nextOffset
    const checked=await checkHistory(data.members)
    const toAdd=checked.filter(m=>!m.exists)

    for(const m of toAdd){
      if(!running) break

      const res=await addMember({...m,targetGroup:target})

      const li=document.createElement("li")
      li.innerHTML=`<img class="avatar" src="${m.avatar}" onerror="this.src='https://via.placeholder.com/40?text=U'">
      ${m.username||m.user_id} → <span class="${res.status==="success"?"success":"failed"}">${res.status}</span>`
      list.appendChild(li)

      total++
      if(res.status==="success"){success++; await new Promise(r=>setTimeout(r,20000))}
      else failed++

      totalBox.innerText=total
      successBox.innerText=success
      failedBox.innerText=failed
      progress.style.width=(total%100)+"%"
    }
  }
  log("✅ Done")
}

// STOP
stop.onclick=()=>{running=false;log("⛔ Stopped")}

// CLEAR
clear.onclick=()=>{
  list.innerHTML=""
  logBox.innerHTML=""
  totalBox.innerText=successBox.innerText=failedBox.innerText="0"
  progress.style.width="0%"
}

// HISTORY
async function loadHistory(){
  const r=await fetch("/history")
  const data=await r.json()
  historyList.innerHTML=""
  Object.values(data).forEach(h=>{
    const li=document.createElement("li")
    li.innerHTML=`${h.username||h.user_id} → ${h.status} (${h.accountUsed})<br><small>${h.reason}</small>`
    historyList.appendChild(li)
  })
}

// ACCOUNTS
async function loadAccounts(){
  const r=await fetch("/account-status")
  const data=await r.json()
  accounts.innerHTML=""
  Object.values(data).forEach(acc=>{
    const div=document.createElement("div")
    let cls="account-card active-card"
    if(acc.status==="floodwait") cls="account-card flood-card"
    if(acc.status==="error") cls="account-card error-card"

    div.className=cls
    div.innerHTML=`<b>${acc.phone}</b><br>${acc.status}<br>
    ${acc.floodWaitUntil?new Date(acc.floodWaitUntil).toLocaleString():""}`
    accounts.appendChild(div)
  })
}

setInterval(()=>{ if(accountSection.style.display==="block") loadAccounts() },5000)
</script>

</body>
</html>
