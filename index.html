<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:#0f0f10;color:#fff;margin:0;}
.container{max-width:1200px;margin:auto;padding:15px;}
nav{background:#111;padding:10px;border-radius:10px;display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
nav button{background:#00ff7f;color:#000;font-weight:700;padding:10px;border:none;border-radius:10px;cursor:pointer;flex:1;}
nav button:hover{background:#00cc66;color:#fff;}
section{background:#1e1e2a;border-radius:20px;padding:20px;margin-bottom:20px;}
.card-title{font-size:22px;font-weight:700;color:#00ff7f;text-align:center;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:10px;border-radius:10px;background:#111;color:#fff;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#00ff7f;font-weight:700;cursor:pointer;}
button:hover{background:#00cc66;color:#fff;}
.success{color:#00ff7f;}
.failed{color:#ff4c4c;}
.avatar{width:30px;height:30px;border-radius:50%;vertical-align:middle;margin-right:5px;}
ul{list-style:none;padding:0;max-height:300px;overflow-y:auto;}
.console{background:#111;padding:10px;border-radius:10px;height:150px;overflow:auto;font-size:12px;}
.progress-bar{background:#111;height:10px;border-radius:10px;margin-top:10px;}
.progress{background:#00ff7f;height:10px;width:0%;border-radius:10px;}
.summary{display:flex;gap:20px;margin-top:10px;font-weight:700;}
.account-dashboard{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
.account-card{padding:15px;border-radius:12px;color:#000;width:180px;flex-shrink:0;}
.account-card.active{background:#00ff7f;}
.account-card.floodwait{background:#ffcc00;}
.account-card.error{background:#ff4c4c;}
.account-card .phone{font-weight:700;margin-bottom:5px;}
.account-card .flood{font-size:12px;color:#111;}
</style>
</head>
<body>

<div class="container">

<nav>
  <button id="autoAddTab">AUTO ADD</button>
  <button id="historyTab">HISTORY</button>
  <button id="accountsTab">ACCOUNTS</button>
</nav>

<!-- AUTO ADD SECTION -->
<section id="autoAddSection">
<div class="card-title">Auto Add Members</div>
<input id="source" placeholder="Source Group">
<input id="target" placeholder="Target Group">
<div class="summary">
  <div>Total: <span id="total">0</span></div>
  <div>Success: <span id="success">0</span></div>
  <div>Failed: <span id="failed">0</span></div>
</div>
<div class="progress-bar"><div id="progress" class="progress"></div></div>
<ul id="list"></ul>
<div class="console" id="console"></div>
</section>

<!-- HISTORY SECTION -->
<section id="historySection" style="display:none;">
<div class="card-title">History</div>
<ul id="historyList"></ul>
</section>

<!-- ACCOUNTS DASHBOARD SECTION -->
<section id="accountsSection" style="display:none;">
<div class="card-title">Accounts Dashboard</div>
<div id="accountCards" class="account-dashboard"></div>
</section>

</div>

<script>
const autoAddTab = document.getElementById("autoAddTab")
const historyTab = document.getElementById("historyTab")
const accountsTab = document.getElementById("accountsTab")
const autoAddSection = document.getElementById("autoAddSection")
const historySection = document.getElementById("historySection")
const accountsSection = document.getElementById("accountsSection")

autoAddTab.onclick = ()=>{ autoAddSection.style.display="block"; historySection.style.display="none"; accountsSection.style.display="none"; }
historyTab.onclick = ()=>{ autoAddSection.style.display="none"; historySection.style.display="block"; accountsSection.style.display="none"; loadHistory() }
accountsTab.onclick = ()=>{ autoAddSection.style.display="none"; historySection.style.display="none"; accountsSection.style.display="block"; loadAccounts() }

const startBtn = document.getElementById("start")
const clearBtn = document.getElementById("clear")
const totalBox = document.getElementById("total")
const successBox = document.getElementById("success")
const failedBox = document.getElementById("failed")
const progress = document.getElementById("progress")
const list = document.getElementById("list")
const consoleBox = document.getElementById("console")

let total=0, success=0, failed=0, offset=0

function log(msg){
  consoleBox.innerHTML += msg+"<br>"
  consoleBox.scrollTop = consoleBox.scrollHeight
}

async function getMembers(source){
  const res = await fetch("/members",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({group:source, offset, limit:20})
  })
  return await res.json()
}

async function checkHistoryBatch(members){
  const res = await fetch("/check-history",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({members})
  })
  const data = await res.json()
  return data.checked || []
}

async function addMember(m){
  const res = await fetch("/add-member",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(m)
  })
  return await res.json()
}

startBtn.onclick = async ()=>{
  const source = document.getElementById("source").value.trim()
  const target = document.getElementById("target").value.trim()
  if(!source || !target) return alert("Enter group")

  offset = 0
  total = success = failed = 0
  list.innerHTML = ""
  consoleBox.innerHTML = ""
  totalBox.innerText = successBox.innerText = failedBox.innerText = "0"
  
  while(true){
    log(`Fetching 20 members from ${source}...`)
    const data = await getMembers(source)
    if(data.error){ log(data.error); break }
    if(!data.members.length){ log("No more members."); break }

    offset = data.nextOffset

    // ===== Batch check history =====
    const checked = await checkHistoryBatch(data.members)
    const toAdd = checked.filter(m=>!m.exists)

    log(`Batch size: ${data.members.length}, to add: ${toAdd.length}`)

    for(const m of toAdd){
      const result = await addMember({...m, targetGroup:target})
      const li = document.createElement("li")
      li.innerHTML = `
        <img class="avatar" src="${m.avatar}" onerror="this.src='https://via.placeholder.com/40/00ff7f/000?text=U'">
        ${m.username||m.user_id}
        → <span class="${result.status==="success"?"success":"failed"}">${result.status}</span>
        (${result.accountUsed})
      `
      list.appendChild(li)

      total++
      totalBox.innerText = total

      if(result.status==="success"){ 
        success++ 
        await new Promise(r=>setTimeout(r,20000)) // 20s delay after success
      } else failed++
      successBox.innerText = success
      failedBox.innerText = failed

      progress.style.width = Math.min((total%100),100)+"%"
    }
  }

  log("✅ Finished Auto Add")
}

clearBtn.onclick = ()=>{
  list.innerHTML = ""
  consoleBox.innerHTML = ""
  totalBox.innerText = successBox.innerText = failedBox.innerText = "0"
  progress.style.width = "0%"
}

// ===== Load History =====
async function loadHistory(){
  const res = await fetch("/history")
  const data = await res.json()
  const historyList = document.getElementById("historyList")
  historyList.innerHTML = ""
  Object.values(data).forEach(h=>{
    const li = document.createElement("li")
    li.innerHTML = `
      <img class="avatar" src="${h.avatar||'https://via.placeholder.com/40/00ff7f/000?text=U'}" onerror="this.src='https://via.placeholder.com/40/00ff7f/000?text=U'">
      ${h.username||h.user_id} → <span class="${h.status==="success"?"success":"failed"}">${h.status}</span>
      (${h.accountUsed}) <br>
      <small>${h.reason} | ${new Date(h.timestamp).toLocaleString()}</small>
    `
    historyList.appendChild(li)
  })
}

// ===== Load Accounts Dashboard =====
async function loadAccounts(){
  const res = await fetch("/account-status")
  const data = await res.json()
  const container = document.getElementById("accountCards")
  container.innerHTML = ""
  Object.values(data).forEach(acc=>{
    const card = document.createElement("div")
    let cls = "account-card active"
    if(acc.status==="floodwait") cls="account-card floodwait"
    else if(acc.status==="error") cls="account-card error"
    const floodText = acc.floodWaitUntil ? `Ready: ${new Date(acc.floodWaitUntil).toLocaleString()}` : ""
    card.className = cls
    card.innerHTML = `
      <div class="phone">${acc.phone}</div>
      <div>Status: ${acc.status}</div>
      <div class="flood">${floodText}</div>
    `
    container.appendChild(card)
  })
}

// Auto-refresh dashboard every 5s
setInterval(()=>{ if(accountsSection.style.display==="block") loadAccounts() }, 5000)
</script>

</body>
</html>
