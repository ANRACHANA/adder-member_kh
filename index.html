<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:#0d0d1a;color:#fff;margin:0;}
.container{max-width:1000px;margin:auto;padding:15px;}
section{background:linear-gradient(135deg,#1b1b2e,#11111f);border-radius:20px;padding:20px;margin-bottom:20px;}
.card-title{font-size:22px;font-weight:700;color:#00ff7f;text-align:center;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:10px;border-radius:10px;background:#111;color:#fff;border:none;}
button{width:auto;padding:12px;margin-top:10px;border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:0.2s;}

button:hover{opacity:0.85;}
.success{color:#00ff7f;font-weight:700;}
.failed{color:#ff4c4c;font-weight:700;}
.skipped{color:orange;font-weight:700;}
.avatar{width:25px;height:25px;border-radius:50%;}
ul{list-style:none;padding:0;max-height:300px;overflow-y:auto;background:#111;border-radius:10px;margin-top:10px;}
.console{background:#111;padding:10px;border-radius:10px;height:150px;overflow:auto;font-size:12px;margin-top:10px;}
.progress-bar{background:#111;height:10px;border-radius:10px;margin-top:10px;}
.progress{background:#00ff7f;height:10px;width:0%;border-radius:10px;}
table{width:100%;border-collapse:collapse;margin-top:10px;background:#111;border-radius:10px;display:block;overflow-x:auto;}
th,td{padding:5px;border:1px solid #222;text-align:left;}
th{background:#222;}
.bar-buttons{display:flex;gap:10px;margin-bottom:15px;width: 50%;}
.bar-buttons button{flex:1;border-radius:10px;}
#btnAutoAddPage{background:#666e6a;color: #00ff7f;}
#btnHistoryPage{background:#5f6263;color: orange;}
.hidden{display:none;}
tbody{display:block;max-height:300px;overflow-y:auto;}
thead, tbody tr{display:table;width:100%;table-layout:fixed;}

/* ===== Mobile Responsive ===== */
@media screen and (max-width: 768px) {
  .container {padding:10px;}
  input, select, button {font-size:14px;padding:8px;}
  .card-title {font-size:18px;}
   .bar-buttons button,
  #autoAddPage button,
  button.inline-btn {
    width: 100%;          /* ទទឹងពេញ container */
    box-sizing: border-box;
  }

  table, thead, tbody, th, td, tr {display:block;}
  thead tr {display:none;}
  tbody tr {margin-bottom:10px;border:1px solid #222;border-radius:10px;padding:5px;background:#111;}
  tbody td {display:flex;justify-content:space-between;padding:5px;border:none;font-size:13px;}
  ul {max-height:200px;font-size:13px;}
  .console {height:120px;font-size:12px;}
  .progress-bar {height:8px;}
  .progress {height:8px;}
}
  #loadingBarWrapper {
  width: 100%;
  height: 8px;
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
  position: relative;
}

#loadingBar {
  width: 30%;
  height: 100%;
  background: #00ff7f;
  border-radius: 10px;
  position: absolute;
  left: -30%;
  animation: loadingMove 1.5s linear infinite;
}

@keyframes loadingMove {
  0% { left: -30%; }
  50% { left: 100%; }
  100% { left: -30%; }
}
#statusBar{
  margin-top:10px;
  background: linear-gradient(135deg,#111,#1a1a2e);
  padding:10px 15px;
  border-radius:12px;
  text-align:center;
  font-size:14px;
  font-weight:600;
  letter-spacing:0.5px;
  box-shadow:0 0 10px rgba(0,255,127,0.2);
}

#statusText{
  color:#00ff7f;
  transition: all 0.3s ease;
}
</style>
</head>
<body>
<div class="container">



<!-- ===== Auto Add ===== -->
<section id="autoAddPage">

  <div class="card-title">Auto Add Members</div>
  <div class="bar-buttons">

  <button id="btnHistoryPage">History & Accounts</button>
</div>
 
  <!-- Multi-line textarea for usernames / links -->
  <textarea id="source" placeholder="Enter multiple @usernames or Telegram links, one per line"
            style="width:100%; height:100px; padding:10px; border-radius:10px; background:#111; color:#fff; border:none; resize:vertical; margin-bottom:10px;"></textarea>

  <input id="target" placeholder="Target Group" 
         style="width:100%; padding:10px; border-radius:10px; background:#111; color:#fff; border:none; margin-bottom:10px;">

<button id="start" style="
  display:block;
  width:50%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
  color: rgb(248, 255, 250);
  cursor:pointer;
  background:#069544;
  transition: transform 0.1s ease, box-shadow 0.1s ease; /* animation */
">
  START AUTO ADD
</button>

  <!-- Loading Bar -->
  <div id="loadingBarWrapper" class="hidden">
    <div id="loadingBar"></div>
  </div>

  <!-- Status & Counter -->
  <div id="statusBar">
    <span id="status">Ready</span>
    <div id="counter">0</div>
  </div>
  
<div id="summaryBox" style="
  margin-top:10px;
  display:flex;
  gap:15px;
  font-weight:700;
  font-size:14px;
  flex-wrap:wrap;
  font-size:14px;

">
  <span class="success" style="color:#00ff7f;">✅ Success: <span id="successCount">0</span></span>
  <span class="failed" style="color:#ff4c4c;">| ❌ Failed: <span id="failedCount">0</span></span>
  <span class="skipped" style="color:orange;">| ⏭️ Skipped: <span id="skippedCount">0</span></span>
  <span class="total" style="color:#00ccff;">| Total: <span id="totalCount">0</span></span>
</div>
  <!-- Progress Bar -->
  <div class="progress-bar">
    <div id="progress" class="progress"></div>
  </div>

  <!-- Members Log & Console -->
  <ul id="list"></ul>
  <div class="console" id="console"></div>
</section>

<!-- ===== History & Accounts ===== -->
<section id="historyPage" class="hidden">
  <div class="card-title">Accounts Status</div>
  <div class="bar-buttons">
  <button id="btnAutoAddPage">Auto Add Members</button>
</div>
<table id="accountTable">
  <thead>
    <tr>
      <th>Phone</th>
      <th>Status</th>
      <th>FloodWait Until</th>
      <th>Last Checked</th>
      <th>Add Count</th>
    </tr>
  </thead>
  <tbody id="accountBody"></tbody>
</table>
<button id="refreshAccounts">Refresh Accounts</button>

<div class="card-title">History</div>
<!-- ===== History Summary ===== -->
<div id="historySummary" style="
  margin-top:10px;
  display:flex;
  gap:15px;
  font-weight:700;
  font-size:14px;
  flex-wrap:wrap;
">
  <span id="historySuccess" style="color:#00ff7f">✅ Success: 0</span>
  <span id="historyFailed" style="color:#ff4c4c">| ❌ Failed: 0</span>
  <span id="historySkipped" style="color:orange">| ⏭️ Skipped: 0</span>
  <span id="historyTotal" style="color:#00ccff">| Total: 0</span>
</div>
<table id="historyTable">
  <thead>
    <tr>
      <th>Username</th>
      <th>Status</th>
      <th>Reason</th>
      <th>Account</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="historyBody"></tbody>
</table>
<button id="refreshHistory">Refresh History</button>
</section>

<script>
const autoAddPage=document.getElementById("autoAddPage")
const historyPage=document.getElementById("historyPage")
document.getElementById("btnAutoAddPage").onclick=()=>{autoAddPage.classList.remove("hidden");historyPage.classList.add("hidden")}
document.getElementById("btnHistoryPage").onclick=()=>{historyPage.classList.remove("hidden");autoAddPage.classList.add("hidden")}

// ===== Live History =====
const historyBody=document.getElementById("historyBody")
let historySet=new Set()

async function loadHistory(){
  const res = await fetch("/history")
  const data = await res.json()
  historyBody.innerHTML = ""
  historySet.clear()

  // ===== summary counters =====
  let success = 0, failed = 0, skipped = 0, total = 0

  Object.values(data).forEach(h=>{
    const tr=document.createElement("tr")
    tr.innerHTML=`<td>${h.username||h.user_id}</td>
      <td class="${h.status==="success"?"success":(h.status==="failed"?"failed":"skipped")}">${h.status}</td>
      <td>${h.reason}</td>
      <td>${h.accountUsed||"-"}</td>
      <td>${new Date(h.timestamp).toLocaleString()}</td>`
    historyBody.appendChild(tr)
    if(h.user_id) historySet.add(h.user_id)
    else if(h.username) historySet.add(h.username)

    // ===== count summary =====
    if(h.status==="success") success++
    else if(h.status==="failed") failed++
    else skipped++
    total++
  })

  // ===== update summary UI =====
  document.getElementById("historySuccess").innerText = `✅ Success: ${success}`
  document.getElementById("historyFailed").innerText = `❌ Failed: ${failed}`
  document.getElementById("historySkipped").innerText = `⏭️ Skipped: ${skipped}`
  document.getElementById("historyTotal").innerText = `🧮 Total: ${total}`
}
document.getElementById("refreshHistory").onclick=loadHistory
setInterval(loadHistory,5000)

// ===== Accounts Table =====
const accountBody=document.getElementById("accountBody")
async function loadAccounts(){
  const res=await fetch("/account-status")
  const data=await res.json()
  accountBody.innerHTML=""
  Object.values(data).forEach(a=>{
    const tr=document.createElement("tr")
    tr.innerHTML=`<td>${a.phone}</td>
      <td class="${a.status==="active"?"success":(a.status==="floodwait"?"skipped":"failed")}">${a.status}</td>
      <td>${a.floodWaitUntil?a.floodWaitUntil?new Date(a.floodWaitUntil).toLocaleString():"-" : "-"}</td>
      <td>${a.lastChecked?a.lastChecked?new Date(a.lastChecked).toLocaleString():"-" : "-"}</td>
      <td>${a.addCount||0}</td>`
    accountBody.appendChild(tr)
  })
}
document.getElementById("refreshAccounts").onclick=loadAccounts
setInterval(loadAccounts,5000)

// ===== Auto Add =====
const startBtn=document.getElementById("start")
const status=document.getElementById("status")
const counter=document.getElementById("counter")
const progress=document.getElementById("progress")
const list=document.getElementById("list")
const consoleBox=document.getElementById("console")
let offset=0,total=0,accIndex=0

// ===== Variables Summary =====
let successCount = 0;
let failedCount = 0;
let skippedCount = 0;

function log(msg, user_id=null, color=null, status=null){
    // បង្កើត li
    const li = document.createElement("li");
    li.innerHTML = msg;
    if(color) li.style.color = color;
    list.appendChild(li);
    list.scrollTop = list.scrollHeight;

    // Update console
    consoleBox.innerHTML += msg + "<br>";
    consoleBox.scrollTop = consoleBox.scrollHeight;

    // ===== Update Summary =====
    if(status === "success"){
        successCount++;
        document.getElementById("successCount").innerText = successCount;
    } else if(status === "failed"){
        failedCount++;
        document.getElementById("failedCount").innerText = failedCount;
    } else if(status === "skipped"){
        skippedCount++;
        document.getElementById("skippedCount").innerText = skippedCount;
    }

    // Update Total
    const total = successCount + failedCount + skippedCount;
    document.getElementById("totalCount").innerText = total;

    // Add to history set
    if(user_id) historySet.add(user_id);
}

async function getAccounts(){ const res=await fetch("/account-status"); return await res.json() }
function nextAccount(data,startIndex){
  const now=Date.now()
  const keys=Object.keys(data)
  for(let i=0;i<keys.length;i++){
    let idx=(startIndex+i)%keys.length
    let acc=data[keys[idx]]
    if(acc.status==="active" && (!acc.floodWaitUntil || acc.floodWaitUntil<now)) return {id:keys[idx], index:idx}
  }
  return null
}

async function autoJoinAllAccounts(group){
  const accounts=await getAccounts()
  for(const key of Object.keys(accounts)){
    const acc=accounts[key]
    if(acc.status!=="active") continue
    try{
      await fetch("/auto-join",{method:"POST",headers:{"Content-Type":"application/json"},body: JSON.stringify({group,account:key})})
      log(`✅ ${acc.phone||acc.id} joined ${group}`)
      await new Promise(r=>setTimeout(r,500))
    }catch(e){ log(`❌ ${acc.phone||acc.id} failed: ${e.message}`) }
  }
}

const loadingBarWrapper = document.getElementById("loadingBarWrapper")

startBtn.onclick = async () => {
  const sourceValue = document.getElementById("source").value.trim()
  const target = document.getElementById("target").value.trim()
  if(!sourceValue || !target) return alert("Enter usernames / links and target group")

  await loadHistory() // preload historySet

  offset = 0; total = 0; accIndex = 0
  list.innerHTML = ""; consoleBox.innerHTML = ""
  loadingBarWrapper.classList.remove("hidden")

  // ===== Detect Mode =====
  let isGroupMode = false
  if(sourceValue.includes("t.me/") && !sourceValue.includes("\n")){
    isGroupMode = true
  }

  // ===============================
  // 🔹 MODE 1: GROUP (EXPORT MEMBERS)
  // ===============================
  if(isGroupMode){
    status.innerText = "Joining source group..."
    await autoJoinAllAccounts(sourceValue)

    status.innerText = "Joining target group..."
    await autoJoinAllAccounts(target)

    let totalMembers = 0

    while(true){
      status.innerText = "Fetching members..."

      const res = await fetch("/members",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ group:sourceValue, offset, limit:50 })
      })

      const data = await res.json()
      if(data.error){ alert(data.error); break }

      const members = data.members || []
      if(members.length === 0) break

      offset = data.nextOffset || 0
      totalMembers += members.length

      const accounts = await getAccounts()

      for(const m of members){
        const userKey = m.user_id || m.username

        if(historySet.has(userKey)){
          log(`⏭️ Skipped ${m.username || m.user_id}`, userKey, "orange")
          total++; counter.innerText = total
          if(totalMembers > 0){
  progress.style.width = Math.min((total / totalMembers) * 100, 100) + "%"
}
          continue
        }

        let acc = nextAccount(accounts, accIndex)

        while(!acc){
          status.innerText = "Waiting for accounts..."
          await countdown(5,"Waiting account")
          const accountsUpdated = await getAccounts()
          acc = nextAccount(accountsUpdated,0)
        }

        accIndex = acc.index
        status.innerText = `Adding: ${m.username || m.user_id}`
        log(`🔹 Using ${acc.id} → ${m.username || m.user_id}`, userKey, "cyan")

        try{
          const addRes = await fetch("/add-member",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
              username:m.username,
              user_id:m.user_id,
              access_hash:m.access_hash,
              targetGroup:target
            })
          })

          const result = await addRes.json()
          let color = result.status==="success"?"lime":
                      result.status==="failed"?"red":"orange"
          log(`${u} → ${result.status}`, userKey, color, result.status)

          if(result.status==="success"){
            const delaySec = 5 + Math.floor(Math.random()*16) // 5–20s random
            await countdown(delaySec,"Delay")
          }

          total++; counter.innerText = total
          progress.style.width = Math.min((total / totalMembers) * 100, 100) + "%"
        }catch(err){
          log(`❌ Error: ${err.message}`, userKey, "red")
        }
      }

      if(!offset || members.length < 50) break // exit loop if no more members
    }

  }

  // ===============================
  // 🔹 MODE 2: TEXTAREA (@USERNAME)
  // ===============================
  else{
    status.innerText = "Joining target group..."
    await autoJoinAllAccounts(target)

    let userList = sourceValue
      .split("\n")
      .map(u => u.trim())
      .filter(u => u)

    const accounts = await getAccounts()
    const totalMembers = userList.length

    for(const u of userList){
      let userKey = u

      if(historySet.has(userKey)){
        log(`⏭️ Skipped ${u}`, userKey, "orange")
        total++; counter.innerText = total
        progress.style.width = Math.min((total / totalMembers) * 100, 100) + "%"
        continue
      }

      let acc = nextAccount(accounts, accIndex)
      while(!acc){
        status.innerText = "Waiting for accounts..."
        await countdown(5,"Waiting account")
        const accountsUpdated = await getAccounts()
        acc = nextAccount(accountsUpdated,0)
      }

      accIndex = acc.index
      status.innerText = `Adding: ${u}`
      log(`🔹 Using ${acc.id} → ${u}`, userKey, "cyan")

      try{
        const addRes = await fetch("/add-member", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            username:u,
            targetGroup:target
          })
        })

        const result = await addRes.json()
        let color = result.status==="success"?"lime":
                    result.status==="failed"?"red":"orange"
        log(`${u} → ${result.status}`, userKey, color, result.status)

        if(result.status==="success"){
          const delaySec = 5 + Math.floor(Math.random()*16)
          await countdown(delaySec,"Delay")
        }

        total++; counter.innerText = total
        progress.style.width = Math.min((total / totalMembers) * 100, 100) + "%"
      }catch(err){
        log(`❌ Error: ${err.message}`, userKey, "red")
      }
    }
  }

  loadingBarWrapper.classList.add("hidden")
  status.innerText = "Finished ✅"
}

function formatTime(sec){
  const h = Math.floor(sec / 3600)
  const m = Math.floor((sec % 3600) / 60)
  const s = sec % 60

  return [
    h.toString().padStart(2,'0'),
    m.toString().padStart(2,'0'),
    s.toString().padStart(2,'0')
  ].join(':')
}

function getFinishTime(sec){
  const now = new Date()
  const finish = new Date(now.getTime() + sec * 1000)
  return finish.toLocaleTimeString('en-GB',{hour12:false})
}

async function countdown(sec,label="Delay"){
  const finishTime = getFinishTime(sec)

  for(let i=sec;i>0;i--){
    status.innerText = `${label} ⏳ ${formatTime(i)} (Finish ${finishTime})`

    // color effect
    status.style.color = i<=10 ? "#ff4c4c" : "#00ff7f"

    await new Promise(r=>setTimeout(r,1000))
  }

  status.innerText = "Processing..."
  status.style.color = "#00ff7f"
}
</script>
</div>
</body>
</html>
